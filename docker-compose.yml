services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: verteksar
      POSTGRES_PASSWORD: ${PASSWORD}
      POSTGRES_DB: monitoring
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U verteksar -d monitoring"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      HOST: db
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata: