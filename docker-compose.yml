services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: verteksar
      POSTGRES_PASSWORD: ...
      POSTGRES_DB: monitoring
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U verteksar -d monitoring"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    env_file: .env
    environment:
      HOST: db
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      1)- backend